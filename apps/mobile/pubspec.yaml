name: growth_record_mobile
description: Flutter WebView shell for the Growth Record web app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_selector: ^1.1.0
  http: ^1.6.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
