<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理后台 - 园中月努力可视化系统</title>
    <link rel="stylesheet" href="/assets/app.css">
    <script defer src="/assets/admin.js"></script>
  </head>
  <body>
    <main class="shell admin-shell">
      <header class="topbar">
        <div>
          <h1>管理后台</h1>
          <p>管理员认证后访问用户和活跃度数据</p>
        </div>
        <nav class="actions admin-only" aria-label="后台操作" hidden>
          <button class="button primary" id="openCreateUser" type="button">新增用户</button>
          <a class="button ghost" href="/">返回首页</a>
        </nav>
      </header>

      <section class="auth-gate" id="adminAuthGate">
        <div>
          <p class="eyebrow">管理员认证</p>
          <h2 id="adminAuthTitle">管理员登录</h2>
          <p id="adminAuthHint">默认管理员账号为 admin。首次访问时需要设置管理员密码。</p>
        </div>
        <form class="login-panel" id="adminLoginForm">
          <label>
            管理员账号
            <input name="account" autocomplete="username" value="admin">
          </label>
          <label>
            管理员密码
            <input name="password" autocomplete="current-password" type="password" placeholder="输入管理员密码">
          </label>
          <button class="button primary" type="submit">进入后台</button>
        </form>
        <form class="login-panel" id="adminSetupForm" hidden>
          <label>
            设置 admin 密码
            <input name="password" autocomplete="new-password" type="password" placeholder="至少 8 位">
          </label>
          <label>
            确认密码
            <input name="confirmPassword" autocomplete="new-password" type="password" placeholder="再次输入">
          </label>
          <button class="button primary" type="submit">保存管理员密码</button>
        </form>
      </section>

      <section class="admin-grid admin-only" hidden>
        <article class="metric-card">
          <span data-label="users"></span>
          <strong id="totalUsers">--</strong>
        </article>
        <article class="metric-card">
          <span data-label="active"></span>
          <strong id="activeToday">--</strong>
        </article>
        <article class="metric-card">
          <span data-label="records"></span>
          <strong id="weeklyRecords">--</strong>
        </article>
      </section>

      <section class="card admin-only" hidden>
        <div class="section-heading">
          <h2>用户列表</h2>
          <p>已通过管理员认证，仅显示后台数据。</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>用户</th>
                <th>邮箱</th>
                <th>手机号</th>
                <th>角色</th>
                <th>状态</th>
                <th>密码状态</th>
                <th>最近活跃</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <tr>
                <td colspan="8">等待管理员 API 数据</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div class="modal-overlay" id="userEditorModal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="userEditorTitle">
        <h2 id="userEditorTitle">新增用户</h2>
        <form id="userEditorForm">
          <input type="hidden" name="id">
          <label>
            邮箱
            <input name="email" autocomplete="email" type="email" placeholder="name@example.com">
          </label>
          <label>
            手机号
            <input name="phone" autocomplete="tel" placeholder="可选">
          </label>
          <label>
            用户名
            <input name="username" autocomplete="username" placeholder="可选">
          </label>
          <label>
            昵称
            <input name="displayName" placeholder="可选">
          </label>
          <label>
            角色
            <select name="role">
              <option value="user">普通用户</option>
              <option value="admin">管理员</option>
            </select>
          </label>
          <label>
            状态
            <select name="status">
              <option value="active">启用</option>
              <option value="disabled">禁用</option>
            </select>
          </label>
          <div class="actions">
            <button class="button ghost" id="closeUserEditor" type="button">取消</button>
            <button class="button primary" type="submit">保存</button>
          </div>
        </form>
        <p class="form-status" id="userEditorStatus" aria-live="polite"></p>
      </section>
    </div>

    <div class="modal-overlay" id="defaultPasswordModal" hidden>
      <section class="modal" role="dialog" aria-modal="true">
        <h2>默认密码</h2>
        <p class="muted">请把默认密码交给用户。用户首次登录后必须修改密码。</p>
        <code class="password-output" id="defaultPasswordOutput"></code>
        <div class="actions">
          <button class="button primary" id="closeDefaultPassword" type="button">知道了</button>
        </div>
      </section>
    </div>
  </body>
</html>
