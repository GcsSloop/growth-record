<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>园中月努力可视化系统</title>
    <link rel="stylesheet" href="/assets/app.css">
    <script defer src="/assets/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>园中月努力可视化系统</h1>
          <p>自由才是我永恒的向往</p>
        </div>
        <nav class="actions app-only" aria-label="主要操作" hidden>
          <button class="button ghost" id="openUserManagement" type="button">用户管理</button>
          <button class="button primary" id="checkinButton" type="button">打卡</button>
        </nav>
      </header>

      <section class="auth-gate" id="authGate">
        <div>
          <p class="eyebrow">需要认证</p>
          <h2>登录后访问你的成长记录</h2>
          <p>请输入账号信息登录。未登录前不会显示个人记录、统计数据或后台入口。</p>
        </div>
        <div class="login-panel">
          <div class="segmented-control" aria-label="认证方式">
            <button class="segment active" data-auth-tab="login" type="button">登录</button>
            <button class="segment" data-auth-tab="register" type="button">注册</button>
          </div>
          <form id="loginForm">
            <label>
              邮箱或用户名
              <input name="account" autocomplete="username" placeholder="邮箱或用户名">
            </label>
            <label>
              密码
              <input name="password" autocomplete="current-password" type="password" placeholder="密码">
            </label>
            <button class="button primary" type="submit">登录</button>
          </form>
          <form id="registerForm" hidden>
            <label>
              邮箱
              <input name="email" autocomplete="email" type="email" placeholder="name@example.com">
            </label>
            <label>
              密码
              <input name="password" autocomplete="new-password" type="password" placeholder="至少 8 位">
            </label>
            <button class="button primary" type="submit">注册并登录</button>
          </form>
          <p class="form-status" id="authStatus" aria-live="polite"></p>
        </div>
      </section>
      <section id="appContent" hidden></section>
    </main>

    <div class="modal-overlay" id="userManagementModal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="userManagementTitle">
        <h2 id="userManagementTitle">用户管理</h2>
        <p class="muted">设置密码后，可以通过邮箱或用户名 + 密码登录。</p>
        <form id="setPasswordForm">
          <label>
            设置密码
            <input name="password" autocomplete="new-password" type="password" placeholder="至少 8 位">
          </label>
          <label>
            确认密码
            <input name="confirmPassword" autocomplete="new-password" type="password" placeholder="再次输入">
          </label>
          <div class="actions">
            <button class="button ghost" id="closeUserManagement" type="button">取消</button>
            <button class="button primary" type="submit">保存密码</button>
          </div>
        </form>
        <p class="form-status" id="passwordStatus" aria-live="polite"></p>
      </section>
    </div>
  </body>
</html>
