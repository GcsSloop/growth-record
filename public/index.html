<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>园中月努力可视化系统</title>
    <link rel="stylesheet" href="/assets/app.css">
    <script defer src="/assets/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>园中月努力可视化系统</h1>
          <p>自由才是我永恒的向往</p>
        </div>
        <nav class="actions app-only" aria-label="主要操作" hidden>
          <button class="button primary" id="checkinButton" type="button">打卡</button>
        </nav>
      </header>

      <section class="auth-gate" id="authGate">
        <div>
          <p class="eyebrow">需要认证</p>
          <h2>登录后访问你的成长记录</h2>
          <p>请输入账号信息登录。未登录前不会显示个人记录、统计数据或后台入口。</p>
        </div>
        <form class="login-panel" id="loginForm">
          <label>
            手机号或用户名
            <input name="account" autocomplete="username" placeholder="手机号 / 用户名">
          </label>
          <label>
            密码或验证码
            <input name="credential" autocomplete="current-password" placeholder="密码 / 验证码">
          </label>
          <button class="button primary" type="button">登录</button>
        </form>
      </section>
      <section id="appContent" hidden></section>
    </main>
  </body>
</html>
